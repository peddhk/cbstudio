<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · CB Studio's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="topbar">
    <a href="/" class="brand">
      <img src="/logo.svg" alt="" class="brand-logo" />
      <span class="brand-text">CB Studio's</span>
    </a>
    <nav class="topnav">
      <a href="/">Voltar</a>
    </nav>
  </header>

  <main class="admin-wrap">
    <div class="admin-header">
      <h1>Painel Admin</h1>
      <div class="token-row">
        <input id="tokenInput" type="password" placeholder="Token admin" />
        <button id="loadBtn" class="btn primary">Carregar</button>
      </div>
    </div>

    <section class="stats">
      <div class="stat">
        <div class="label">Total de Replays</div>
        <div class="value" id="statTotal">—</div>
      </div>
      <div class="stat">
        <div class="label">Tamanho Storage</div>
        <div class="value" id="statSize">—</div>
      </div>
      <div class="stat">
        <div class="label">Última Key</div>
        <div class="value" id="statLast">—</div>
      </div>
    </section>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Player</th>
            <th>Replay</th>
            <th>Modo</th>
            <th>Frames</th>
            <th>Tamanho</th>
            <th>Data</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td class="empty" colspan="8">Insira o token admin e clique em Carregar.</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> CB Studio's · Painel Admin</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const tokenInput = document.getElementById('tokenInput');
    const loadBtn = document.getElementById('loadBtn');
    const rows = document.getElementById('rows');
    const statTotal = document.getElementById('statTotal');
    const statSize = document.getElementById('statSize');
    const statLast = document.getElementById('statLast');

    const SAVED = localStorage.getItem('cb_admin_token');
    if (SAVED) tokenInput.value = SAVED;

    function fmtBytes(b) {
      if (!b) return '0 B';
      const u = ['B','KB','MB','GB'];
      let i = 0; let v = b;
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
      return v.toFixed(v < 10 ? 2 : 1) + ' ' + u[i];
    }
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function load() {
      const token = tokenInput.value.trim();
      if (!token) {
        rows.innerHTML = '<tr><td class="empty" colspan="8">Token obrigatório.</td></tr>';
        return;
      }
      localStorage.setItem('cb_admin_token', token);

      rows.innerHTML = '<tr><td class="empty" colspan="8">Carregando…</td></tr>';
      try {
        const res = await fetch('/api/list', { headers: { 'x-admin-token': token } });
        if (res.status === 401) {
          rows.innerHTML = '<tr><td class="empty" colspan="8">Token inválido.</td></tr>';
          statTotal.textContent = '—'; statSize.textContent = '—'; statLast.textContent = '—';
          return;
        }
        const data = await res.json();
        statTotal.textContent = data.total ?? 0;
        statSize.textContent = data.totalSize || fmtBytes(data.totalBytes || 0);
        statLast.textContent = (data.items && data.items[0] && data.items[0].key) || '—';

        if (!data.items || data.items.length === 0) {
          rows.innerHTML = '<tr><td class="empty" colspan="8">Nenhum replay enviado ainda.</td></tr>';
          return;
        }
        rows.innerHTML = data.items.map(item => `
          <tr>
            <td><span class="key-tag">${escapeHtml(item.key)}</span></td>
            <td>${escapeHtml(item.player || '—')}</td>
            <td>${escapeHtml(item.replayName || '—')}</td>
            <td>${escapeHtml(item.mode || '—')}</td>
            <td>${item.frames ?? 0}</td>
            <td>${fmtBytes(item.size || 0)}</td>
            <td>${item.uploadedAt ? new Date(item.uploadedAt).toLocaleString() : '—'}</td>
            <td>
              <a class="btn" href="/api/view/${encodeURIComponent(item.key)}" target="_blank" rel="noopener">Ver</a>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        rows.innerHTML = '<tr><td class="empty" colspan="8">Erro ao carregar.</td></tr>';
      }
    }

    loadBtn.addEventListener('click', load);
    tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
  </script>
</body>
</html>
